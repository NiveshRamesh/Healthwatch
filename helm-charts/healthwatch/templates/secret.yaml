{{- $secretName := printf "%s-secrets" (include "healthwatch.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Values.namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "healthwatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and $existing (index $existing.data "CLICKHOUSE_PASSWORD") }}
  CLICKHOUSE_PASSWORD: {{ index $existing.data "CLICKHOUSE_PASSWORD" | b64dec }}
  {{- else }}
  CLICKHOUSE_PASSWORD: {{ .Values.secrets.clickhousePassword | quote }}
  {{- end }}
  {{- if and $existing (index $existing.data "POSTGRES_PASSWORD") }}
  POSTGRES_PASSWORD: {{ index $existing.data "POSTGRES_PASSWORD" | b64dec }}
  {{- else }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  {{- end }}
