{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "healthwatch.fullname" . }}-reader
  labels:
    {{- include "healthwatch.labels" . | nindent 4 }}
rules:
  # Core resources
  - apiGroups: [""]
    resources: ["pods", "nodes", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  # Pod exec — required for ZooKeeper ruok/mntr stats (check_zookeeper_stats)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  # Pod logs — required for crash log extraction (check_pod_images_and_crashes)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Metrics API (for node/pod CPU and memory usage)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  # ConfigMaps — read cert-status from cert-checker CronJob
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  # CSR access for cert health checks
  - apiGroups: ["certificates.k8s.io"]
    resources: ["certificatesigningrequests"]
    verbs: ["get", "list"]
  # DaemonSets — post-renewal checks (kube-proxy, CNI)
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments"]
    verbs: ["get", "list"]
  # Events — post-renewal warning event detection
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  # Batch — trigger cert-checker CronJob on demand (refresh scan)
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "healthwatch.fullname" . }}-reader-binding
  labels:
    {{- include "healthwatch.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "healthwatch.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
{{- end }}
